name: Build And Deploy To AKS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: ${{ vars.ACR_NAME }}.azurecr.io
  IMAGE_TAG: ${{ github.sha }}
  AKS_NAMESPACE: ${{ vars.AKS_NAMESPACE != '' && vars.AKS_NAMESPACE || 'talking-points' }}
  HELM_RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME != '' && vars.HELM_RELEASE_NAME || 'talking-points' }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ACR
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"
      - name: Build Frontend Docker image
        run: |
          docker buildx build --platform linux/amd64 \
            -t "$REGISTRY/talking-points-frontend:$IMAGE_TAG" \
            -t "$REGISTRY/talking-points-frontend:latest" \
            -f Dockerfile . --push

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ACR
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"
      - name: Build Backend Docker image
        run: |
          docker buildx build --platform linux/amd64 \
            -t "$REGISTRY/talking-points-backend:$IMAGE_TAG" \
            -t "$REGISTRY/talking-points-backend:latest" \
            -f src/server/Dockerfile.prod . --push

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-frontend
      - build-backend
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: "v0.1.1"

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}
          admin: "false"
          use-kubelogin: "true"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Ensure namespace exists
        run: |
          kubectl create namespace "$AKS_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Lint chart
        run: |
          helm lint ./deploy

      - name: Deploy release
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" ./deploy \
            --namespace "$AKS_NAMESPACE" \
            --create-namespace \
            --set frontend.image.repository="$REGISTRY/talking-points-frontend" \
            --set frontend.image.tag="$IMAGE_TAG" \
            --set backend.image.repository="$REGISTRY/talking-points-backend" \
            --set backend.image.tag="$IMAGE_TAG" \
            --set serviceAccount.annotations.azure\.workload\.identity/client-id="${{ vars.BACKEND_WORKLOAD_CLIENT_ID }}" \
            --set backend.env.AZURE_CLIENT_ID="${{ vars.BACKEND_WORKLOAD_CLIENT_ID }}" \
            --set backend.env.AZURE_TENANT_ID="${{ vars.AZURE_TENANT_ID }}" \
            --set-string backend.env.APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
            --wait \
            --timeout 10m
