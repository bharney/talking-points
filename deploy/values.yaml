# Default values for talking-points chart
# This is a YAML-formatted file.

# Service Account configuration
serviceAccount:
  create: true
  name: backend-identity
  annotations: {}

# Frontend configuration
frontend:
  name: talking-points-frontend
  replicaCount: 1
  image:
    repository: starterpackregistry.azurecr.io/talking-points-frontend
    tag: latest
    pullPolicy: Always

  service:
    name: talking-points-frontend
    type: ClusterIP
    port: 80
    targetPort: 3000

  env:
    NEXT_PUBLIC_API_URL: "http://talking-points-backend:8080"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Backend configuration
backend:
  name: talking-points-backend
  replicaCount: 1
  image:
    repository: starterpackregistry.azurecr.io/talking-points-backend
    tag: latest
    pullPolicy: Always

  service:
    name: talking-points-backend
    type: ClusterIP
    port: 8080
    targetPort: 8080

  env:
    AZURE_CLIENT_ID: ""
    AZURE_TENANT_ID: ""
    APPLICATIONINSIGHTS_CONNECTION_STRING: ""

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Ingress configuration
ingress:
  enabled: true
  name: talking-points-ingress
  annotations:
    kubernetes.io/ingress.class: webapprouting.kubernetes.azure.com
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  host: ""
  tls:
    enabled: false
    secretName: talking-points-tls

# Network Policy configuration
networkPolicy:
  enabled: false
  name: allow-egress-to-azure
  backend:
    app: talking-points-backend
  egress:
    allowAll: true
    sql:
      enabled: false
      port: 1433
      cidrs: []
    redis:
      enabled: false
      port: 6380
      cidr: ""
    dns:
      enabled: false
      cidr: "168.63.129.16/32"
      ports:
        udp: 53
        tcp: 53

# Azure Workload Identity Webhook
azureWorkloadIdentity:
  webhook:
    enabled: false
    image: mcr.microsoft.com/oss/azure/workload-identity/webhook:v1.1.0
    replicas: 2
    logLevel: "info"

# Node selector for AKS
nodeSelector:
  kubernetes.io/arch: amd64
  kubernetes.io/os: linux
